name: "🐛 Bug Report"
description: "Create a report to help us improve DeepSpec"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form as completely as possible to help us reproduce and fix the bug.
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "e.g., train.py fails with CUDA Out of Memory on 4 GPUs..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Provide steps, configuration files, or script commands to reproduce the behavior."
      placeholder: |
        1. Set config_path = config/dspark/dspark_qwen3_4b.py
        2. Run 'bash scripts/train/train.sh'
        3. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs or Stack Traces"
      description: "Please copy-paste any relevant error messages or console stack traces here."
      render: shell
  - type: input
    id: environment
    attributes:
      label: "Environment Details"
      description: "Python version, PyTorch version, CUDA version, GPU models, etc."
      placeholder: "Python 3.10, PyTorch 2.9.1, CUDA 12.4, 8x H100 GPUs"
    validations:
      required: true
