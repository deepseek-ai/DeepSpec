name: "🚀 Feature Request"
description: "Suggest an idea or algorithm for DeepSpec"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the form below.
  - type: textarea
    id: rationale
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is."
      placeholder: "e.g., I'm trying to train a speculative decoding model using algorithm X, but it is not supported..."
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
      placeholder: "Support for algorithm X with a new draft config under config/..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "Any alternative solutions or features you've considered."
